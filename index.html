<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portale Esami SFP</title>
  
  <meta name="robots" content="noindex, nofollow, noarchive">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 1024px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .icon-logo {
      width: 64px;
      height: 64px;
      color: #4f46e5;
      background-color: #eef2ff;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .icon-logo svg { width: 32px; height: 32px; }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #0f172a;
    }
    /* QUICK NAV */
    .quick-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .quick-nav-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: #64748b;
      margin-right: 0.25rem;
    }
    .nav-btn {
      background: white;
      border: 2px solid #e2e8f0;
      color: #475569;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover {
      border-color: #818cf8;
      color: #4f46e5;
      background: #eef2ff;
    }

    /* SEARCH BAR */
    .search-container {
      position: sticky;
      top: 1rem;
      z-index: 10;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      background: white;
      border-radius: 1rem;
      padding: 0.75rem 1.25rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      border: 2px solid #e2e8f0;
      transition: border-color 0.2s;
    }
    .search-container:focus-within { border-color: #4f46e5; }
    .search-container svg { color: #64748b; margin-right: 0.75rem; }
    .search-container input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1.1rem;
      color: #334155;
      background: transparent;
      font-weight: 500;
    }
    .search-container input::placeholder { color: #94a3b8; }
    
    /* SECTIONS */
    .category-section {
      background: #ffffff;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border-top: 4px solid #4f46e5;
    }
    .category-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #1e293b;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.75rem;
    }
    .category-title svg { color: #4f46e5; width: 20px; height: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 0.75rem;
    }
    
    /* CARDS */
    .card-wrapper {
      display: flex;
      align-items: stretch;
      background-color: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 0.5rem;
      transition: all 0.2s ease;
      overflow: hidden;
    }
    .card-wrapper:hover {
      border-color: #818cf8;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .card-link {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0.75rem;
      text-decoration: none;
      color: #334155;
      font-weight: 600;
      min-width: 0; /* allows text truncation */
    }
    .card-link:hover { background-color: #f8fafc; }
    
    .card-icon {
      flex-shrink: 0;
      background-color: #e0e7ff;
      color: #4f46e5;
      width: 32px;
      height: 32px;
      border-radius: 0.375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 0.75rem;
    }
    
    .card-content {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-title { font-size: 0.95rem; }
    
    .check-btn {
      width: 48px;
      border: none;
      background: transparent;
      border-left: 1px solid #e2e8f0;
      color: #cbd5e1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .check-btn:hover { background: #f1f5f9; color: #475569; }
    
    /* COMPLETED STATE */
    .card-wrapper.completed {
      background-color: #f1f5f9;
      border-color: #cbd5e1;
      opacity: 0.7;
    }
    .card-wrapper.completed .card-icon {
      background-color: #cbd5e1;
      color: #64748b;
    }
    .card-wrapper.completed .card-title {
      text-decoration: line-through;
      color: #64748b;
    }
    .card-wrapper.completed .check-btn {
      background-color: #22c55e;
      color: white;
      border-left-color: #22c55e;
      opacity: 1;
    }
    .card-wrapper.completed:hover { opacity: 0.9; }
    
    .empty-state { text-align: center; padding: 3rem; background: white; border-radius: 1rem; color: #64748b; font-weight: 500; }
    
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .category-section { padding: 1rem; }
      .search-container { position: static; margin-bottom: 1.5rem; }
      h1 { font-size: 1.75rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. GESTIONE LOCAL STORAGE (PROGRESSI)
      const STORAGE_KEY = 'sfp_esami_completati';
      let completedExams = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      
      const cards = document.querySelectorAll('.card-wrapper');
      
      cards.forEach(card => {
        const id = card.getAttribute('data-id');
        const btn = card.querySelector('.check-btn');
        
        // Inizializza lo stato se era stato salvato in precedenza
        if (completedExams.includes(id)) {
          card.classList.add('completed');
        }
        
        // Toggle completamento al click del bottone (non del link)
        btn.addEventListener('click', (e) => {
          e.preventDefault(); // Evita scroll strani o comportamenti imprevisti
          const isNowCompleted = card.classList.toggle('completed');
          
          if (isNowCompleted) {
            if (!completedExams.includes(id)) completedExams.push(id);
          } else {
            completedExams = completedExams.filter(item => item !== id);
          }
          
          localStorage.setItem(STORAGE_KEY, JSON.stringify(completedExams));
        });
      });

      // 2. GESTIONE RICERCA (SEARCH BAR)
      const searchInput = document.getElementById('searchInput');
      const sections = document.querySelectorAll('.category-section');
      
      searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        
        sections.forEach(section => {
          let visibleCards = 0;
          const sectionCards = section.querySelectorAll('.card-wrapper');
          
          sectionCards.forEach(card => {
            const title = card.getAttribute('data-title');
            if (title.includes(term)) {
              card.style.display = 'flex';
              visibleCards++;
            } else {
              card.style.display = 'none';
            }
          });
          
          // Nascondi intera sezione se nessun esame trovato all'interno
          section.style.display = visibleCards > 0 ? 'block' : 'none';
        });
      });
    });
  </script>

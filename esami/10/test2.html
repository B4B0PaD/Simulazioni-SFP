<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulazione Ufficiale Test SFP</title>
  
  <!-- Tailwind CSS per lo styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (UMD Build) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (Compila il JSX nel browser in tempo reale) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
  
  <div id="root"></div>

  <!-- Il nostro codice React convertito per funzionare con Babel Standalone -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ICONE SVG ---
    const IconWrapper = ({ children, className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );
    const BookOpen = ({className}) => <IconWrapper className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
    const CheckCircle2 = ({className}) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
    const XCircle = ({className}) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></IconWrapper>;
    const RotateCcw = ({className}) => <IconWrapper className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
    const Award = ({className}) => <IconWrapper className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
    const Play = ({className}) => <IconWrapper className={className}><polygon points="5 3 19 12 5 21 5 3"/></IconWrapper>;
    const ListOrdered = ({className}) => <IconWrapper className={className}><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></IconWrapper>;
    const BrainCircuit = ({className}) => <IconWrapper className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13h4.5a2 2 0 0 1 1.9 1.3"/><path d="M9 13H4.5a2 2 0 0 0-1.9 1.3"/><path d="M15 17h.01"/><path d="M9 17h.01"/></IconWrapper>;
    const AlertTriangle = ({className}) => <IconWrapper className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconWrapper>;
    const LayoutGrid = ({className}) => <IconWrapper className={className}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></IconWrapper>;
    const History = ({className}) => <IconWrapper className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></IconWrapper>;
    const ChevronLeft = ({className}) => <IconWrapper className={className}><path d="m15 18-6-6 6-6"/></IconWrapper>;
    const ChevronRight = ({className}) => <IconWrapper className={className}><path d="m9 18 6-6-6-6"/></IconWrapper>;
    const Send = ({className}) => <IconWrapper className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></IconWrapper>;
    const X = ({className}) => <IconWrapper className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconWrapper>;

    // --- DATI DELLA SIMULAZIONE ---
    const quizQuestions = [
      {
        category: "Competenza linguistica e ragionamento logico",
        passage: "La memoria di lavoro è un sistema a capacità limitata responsabile dell'elaborazione temporanea e della memorizzazione delle informazioni necessarie per compiti cognitivi complessi come la comprensione del linguaggio, l'apprendimento e il ragionamento. Secondo il modello di Baddeley e Hitch (1974), essa non è un magazzino passivo, ma un sistema multicomponenziale che include un esecutivo centrale, che coordina l'attività, e dei servosistemi, tra cui il circuito fonologico e il taccuino visuo-spaziale, dedicati a specifiche tipologie di input.",
        question: "In base al brano proposto, quale delle seguenti affermazioni sulla memoria di lavoro è CORRETTA?",
        options: [
          "È un magazzino puramente passivo che archivia informazioni per un tempo indeterminato.",
          "È composta esclusivamente da un esecutivo centrale senza alcun altro sottosistema.",
          "Ha una capacità illimitata che permette di eseguire infiniti compiti cognitivi contemporaneamente.",
          "Si occupa sia della memorizzazione temporanea sia dell'elaborazione delle informazioni per compiti complessi.",
          "Il taccuino visuo-spaziale è il nucleo centrale che coordina tutte le altre attività di memoria."
        ],
        correctAnswerIndex: 3,
        explanation: "Il brano specifica chiaramente che la memoria di lavoro è responsabile sia dell'elaborazione temporanea sia della memorizzazione per compiti complessi, e non è un magazzino passivo."
      },
      {
        category: "Competenza linguistica e ragionamento logico",
        passage: "",
        question: "Considerando vere le premesse 'Tutti i maestri sono pazienti' e 'Alcuni sportivi sono maestri', quale delle seguenti deduzioni è logicamente ineccepibile?",
        options: [
          "Nessuno sportivo è paziente",
          "Tutti gli sportivi sono pazienti",
          "Alcuni sportivi sono pazienti",
          "Tutti i pazienti sono sportivi",
          "Alcuni maestri non sono pazienti"
        ],
        correctAnswerIndex: 2,
        explanation: "Trattandosi di un sillogismo: se la classe dei 'maestri' è interamente contenuta in quella dei 'pazienti', e alcuni 'sportivi' fanno parte dei 'maestri', allora questi ultimi devono necessariamente essere anche 'pazienti'. Dunque, alcuni sportivi sono pazienti."
      },
      {
        category: "Competenza linguistica e ragionamento logico",
        passage: "",
        question: "Quale tra i seguenti termini rappresenta il sinonimo più corretto per il verbo 'procrastinare'?",
        options: [
          "Anticipare",
          "Annullare",
          "Differire",
          "Affrontare",
          "Dimenticare"
        ],
        correctAnswerIndex: 2,
        explanation: "Procrastinare significa rinviare o rimandare a un altro momento un'azione o una decisione; il sinonimo esatto in questo elenco è 'Differire'."
      },
      {
        category: "Competenza linguistica e ragionamento logico",
        passage: "",
        question: "Individua il numero che completa correttamente la seguente serie numerica: 2, 6, 12, 20, ?",
        options: [
          "24",
          "28",
          "30",
          "32",
          "36"
        ],
        correctAnswerIndex: 2,
        explanation: "La serie segue una logica di incrementi crescenti: +4 (da 2 a 6), +6 (da 6 a 12), +8 (da 12 a 20). L'incremento successivo deve essere +10. Quindi 20 + 10 = 30."
      },
      {
        category: "Competenza linguistica e ragionamento logico",
        passage: "",
        question: "Completa in modo logico la seguente proporzione verbale: 'Albero : Foglie = Libro : ?'",
        options: [
          "Pagine",
          "Copertina",
          "Scrittore",
          "Libreria",
          "Inchiostro"
        ],
        correctAnswerIndex: 0,
        explanation: "Le foglie sono gli elementi molteplici che compongono la chioma dell'albero; analogamente, le pagine sono gli elementi plurimi che costituiscono la parte interna e leggibile del libro."
      },
      {
        category: "Cultura letteraria, storico-sociale e geografica",
        passage: "",
        question: "In quale anno è entrata in vigore la Costituzione della Repubblica Italiana?",
        options: [
          "1945",
          "1946",
          "1947",
          "1948",
          "1950"
        ],
        correctAnswerIndex: 3,
        explanation: "La Costituzione Italiana è stata promulgata dal Capo provvisorio dello Stato Enrico De Nicola il 27 dicembre 1947 ed è entrata in vigore il 1º gennaio 1948."
      },
      {
        category: "Cultura letteraria, storico-sociale e geografica",
        passage: "",
        question: "Quale celebre autore italiano ha teorizzato la poetica del 'Fanciullino', secondo cui in ogni uomo si nasconde uno spirito infantile capace di stupirsi di fronte alle piccole cose?",
        options: [
          "Giacomo Leopardi",
          "Giovanni Pascoli",
          "Gabriele D'Annunzio",
          "Luigi Pirandello",
          "Italo Svevo"
        ],
        correctAnswerIndex: 1,
        explanation: "'Il fanciullino' è un'opera saggistica del 1897 di Giovanni Pascoli, che racchiude il cuore della sua visione poetica ed estetica."
      },
      {
        category: "Cultura letteraria, storico-sociale e geografica",
        passage: "",
        question: "Quale delle seguenti regioni italiane NON è bagnata dal mare?",
        options: [
          "Campania",
          "Umbria",
          "Basilicata",
          "Molise",
          "Veneto"
        ],
        correctAnswerIndex: 1,
        explanation: "L'Umbria è l'unica regione dell'Italia peninsulare a non essere bagnata dal mare (le altre regioni senza sbocco marittimo sono in Italia settentrionale: Valle d'Aosta, Piemonte, Lombardia, Trentino-Alto Adige)."
      },
      {
        category: "Cultura matematico-scientifica",
        passage: "",
        question: "Lanciando contemporaneamente due dadi a sei facce non truccati, qual è la probabilità che la somma dei numeri usciti sia esattamente 7?",
        options: [
          "1/6",
          "1/12",
          "1/36",
          "7/36",
          "1/7"
        ],
        correctAnswerIndex: 0,
        explanation: "I casi totali lanciando due dadi sono 6 x 6 = 36. Le combinazioni che danno somma 7 sono 6: (1,6), (2,5), (3,4), (4,3), (5,2), (6,1). La probabilità è quindi 6/36, che semplificato risulta 1/6."
      },
      {
        category: "Cultura matematico-scientifica",
        passage: "",
        question: "In biologia, quale organulo cellulare è considerato la 'centrale energetica' della cellula eucariotica, essendo la sede principale della produzione di ATP?",
        options: [
          "Ribosoma",
          "Apparato di Golgi",
          "Mitocondrio",
          "Lisosoma",
          "Reticolo endoplasmatico"
        ],
        correctAnswerIndex: 2,
        explanation: "I mitocondri sono organuli presenti nel citoplasma di quasi tutte le cellule eucariote, specializzati nella respirazione cellulare e nella sintesi di ATP, fornendo energia all'organismo."
      }
    ];

    // --- GENERAZIONE ID UNIVOCO (HASH) BASATO SULLE DOMANDE ---
    // Questo garantisce che file HTML identici usino la stessa memoria, 
    // ma file con test (e domande) diverse usino celle di memoria totalmente separate.
    const generateTestId = () => {
      const testContent = quizQuestions.map(q => q.question).join('|');
      let hash = 0;
      for (let i = 0; i < testContent.length; i++) {
        const char = testContent.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Converte a intero a 32 bit
      }
      return "sfp_test_" + Math.abs(hash);
    };
    
    const TEST_ID = generateTestId();

    // --- COMPONENTE REACT PRINCIPALE ---
    function App() {
      const [started, setStarted] = useState(false);
      const [currentIndex, setCurrentIndex] = useState(0);
      
      // userAnswers mantiene lo stato di ogni domanda: null se non risposta, oppure { selectedIndex, isCorrect, points }
      const [userAnswers, setUserAnswers] = useState(Array(quizQuestions.length).fill(null));
      
      const [testFinished, setTestFinished] = useState(false);
      const [showGridModal, setShowGridModal] = useState(false);
      const [showSubmitModal, setShowSubmitModal] = useState(false);
      const [hasSavedSession, setHasSavedSession] = useState(false);

      // Caricamento iniziale per verificare se c'è una sessione salvata in memoria (specifica per questo TEST_ID)
      useEffect(() => {
        const savedAnswers = localStorage.getItem(`${TEST_ID}_answers`);
        if (savedAnswers) {
          setHasSavedSession(true);
        }
      }, []);

      // Salvataggio automatico progressi ad ogni modifica (se il test è iniziato)
      useEffect(() => {
        if (started && !testFinished) {
          localStorage.setItem(`${TEST_ID}_answers`, JSON.stringify(userAnswers));
          localStorage.setItem(`${TEST_ID}_current_index`, currentIndex.toString());
        }
      }, [userAnswers, currentIndex, started, testFinished]);

      useEffect(() => {
        if (started) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, [currentIndex, started]);

      const startTest = () => {
        localStorage.removeItem(`${TEST_ID}_answers`);
        localStorage.removeItem(`${TEST_ID}_current_index`);
        setHasSavedSession(false);
        setStarted(true);
        setCurrentIndex(0);
        setUserAnswers(Array(quizQuestions.length).fill(null));
        setTestFinished(false);
        setShowGridModal(false);
        setShowSubmitModal(false);
      };

      const resumeTest = () => {
        try {
          const savedAnswers = JSON.parse(localStorage.getItem(`${TEST_ID}_answers`));
          const savedIndex = parseInt(localStorage.getItem(`${TEST_ID}_current_index`) || '0', 10);
          
          if (savedAnswers && Array.isArray(savedAnswers)) {
            setUserAnswers(savedAnswers);
            setCurrentIndex(savedIndex);
            setStarted(true);
            setTestFinished(false);
            setShowGridModal(false);
            setShowSubmitModal(false);
          } else {
            startTest(); // fallback se i dati sono corrotti
          }
        } catch (e) {
          startTest();
        }
      };

      const currentAnswer = userAnswers[currentIndex];
      const isAnswered = currentAnswer !== null;

      const handleSelectOption = (index) => {
        if (isAnswered) return; // Se ha già risposto, non fa nulla (feedback bloccato)
        
        const isCorrect = index === quizQuestions[currentIndex].correctAnswerIndex;
        let pointsToAdd = isCorrect ? 1 : -0.25;
        
        const newAnswers = [...userAnswers];
        newAnswers[currentIndex] = {
          selectedIndex: index,
          isCorrect,
          points: pointsToAdd
        };
        setUserAnswers(newAnswers);
      };

      const handleNext = () => {
        if (currentIndex < quizQuestions.length - 1) {
          setCurrentIndex(c => c + 1);
        }
      };

      const handlePrev = () => {
        if (currentIndex > 0) {
          setCurrentIndex(c => c - 1);
        }
      };

      const submitTest = () => {
        localStorage.removeItem(`${TEST_ID}_answers`);
        localStorage.removeItem(`${TEST_ID}_current_index`);
        setHasSavedSession(false);
        setShowSubmitModal(false);
        setTestFinished(true);
      };

      const currentScore = userAnswers.reduce((sum, ans) => sum + (ans ? ans.points : 0), 0);
      const answeredCount = userAnswers.filter(ans => ans !== null).length;

      if (!started) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div className="bg-white max-w-2xl w-full rounded-2xl shadow-xl p-10 text-center border-t-8 border-indigo-600">
              <BookOpen className="w-20 h-20 text-indigo-600 mx-auto mb-6" />
              <h1 className="text-4xl font-extrabold text-slate-800 mb-4 tracking-tight">Simulazione Ufficiale Test SFP</h1>
              <p className="text-xl text-slate-600 mb-8 font-medium">Scienze della Formazione Primaria 2026/2027</p>
              
              <div className="bg-slate-100 rounded-xl p-6 mb-8 text-left space-y-4">
                <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                  <ListOrdered className="w-5 h-5 text-indigo-600"/> Struttura del Test ({quizQuestions.length} Quesiti)
                </h3>
                <ul className="list-disc pl-6 text-slate-700 space-y-2">
                  <li><strong>Competenza linguistica e ragionamento logico:</strong> 40 quesiti</li>
                  <li><strong>Cultura letteraria, storico-sociale e geografica:</strong> 20 quesiti</li>
                  <li><strong>Cultura matematico-scientifica:</strong> 20 quesiti</li>
                </ul>
                <div className="border-t border-slate-300 pt-4 mt-4">
                  <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-2">
                    <BrainCircuit className="w-5 h-5 text-indigo-600"/> Criteri di Valutazione Ministeriale
                  </h3>
                  <div className="grid grid-cols-3 gap-4 text-center">
                    <div className="bg-green-100 text-green-800 p-3 rounded-lg font-semibold">+1 Punto <br/><span className="text-sm font-normal">Risposta esatta</span></div>
                    <div className="bg-red-100 text-red-800 p-3 rounded-lg font-semibold">-0.25 Punti <br/><span className="text-sm font-normal">Risposta errata</span></div>
                    <div className="bg-slate-200 text-slate-800 p-3 rounded-lg font-semibold">0 Punti <br/><span className="text-sm font-normal">Non data</span></div>
                  </div>
                </div>
                <div className="bg-yellow-50 text-yellow-800 p-4 rounded-lg text-sm border border-yellow-200 flex items-start gap-3 mt-4">
                  <AlertTriangle className="w-6 h-6 shrink-0"/>
                  <p><strong>Modalità Attiva con Navigazione Libera:</strong> Riceverai feedback immediato alle tue risposte, e potrai saltare e tornare indietro sulle domande quando preferisci grazie alla griglia di navigazione.</p>
                </div>
              </div>
              
              {hasSavedSession ? (
                <div className="bg-indigo-50 border-2 border-indigo-200 p-6 rounded-xl text-center shadow-inner">
                  <h3 className="text-xl font-bold text-indigo-900 mb-2 flex items-center justify-center gap-2">
                    <History className="w-6 h-6"/> Sessione in Sospeso
                  </h3>
                  <p className="text-indigo-700 mb-6 font-medium">Hai un test iniziato in precedenza. Vuoi riprendere da dove avevi lasciato?</p>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <button onClick={resumeTest} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
                      <Play className="w-5 h-5 fill-current"/> Riprendi Test
                    </button>
                    <button onClick={startTest} className="flex-1 bg-white border-2 border-slate-300 hover:border-slate-400 text-slate-700 font-bold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-2">
                      <RotateCcw className="w-5 h-5"/> Inizia da capo
                    </button>
                  </div>
                </div>
              ) : (
                <button onClick={startTest} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl text-xl transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-3 transform hover:-translate-y-1">
                  <Play className="w-6 h-6 fill-current"/> Inizia la Simulazione
                </button>
              )}
            </div>
          </div>
        );
      }

      if (testFinished) {
        const correctAnswers = userAnswers.filter(a => a && a.isCorrect).length;
        const wrongAnswers = userAnswers.filter(a => a && !a.isCorrect).length;
        const skippedAnswers = quizQuestions.length - answeredCount;

        return (
          <div className="min-h-screen p-6 flex items-center justify-center">
            <div className="bg-white max-w-3xl w-full rounded-2xl shadow-xl p-10 text-center border-t-8 border-indigo-600">
              <Award className="w-24 h-24 text-indigo-600 mx-auto mb-6" />
              <h2 className="text-4xl font-extrabold text-slate-800 mb-2">Risultato Finale</h2>
              <p className="text-slate-600 mb-8">Hai completato la simulazione del test per Scienze della Formazione Primaria.</p>
              
              <div className="bg-indigo-50 rounded-2xl p-8 mb-8">
                <div className="text-7xl font-black text-indigo-700 mb-2">{currentScore.toFixed(2)}<span className="text-3xl text-indigo-400">/{quizQuestions.length}</span></div>
                <p className="text-indigo-800 font-medium">Punteggio Ministeriale Calcolato</p>
              </div>

              <div className="grid grid-cols-3 gap-4 mb-10">
                <div className="bg-green-50 p-4 rounded-xl border border-green-200">
                  <div className="text-3xl font-bold text-green-700">{correctAnswers}</div>
                  <div className="text-sm text-green-800 font-medium">Risposte Corrette</div>
                </div>
                <div className="bg-red-50 p-4 rounded-xl border border-red-200">
                  <div className="text-3xl font-bold text-red-700">{wrongAnswers}</div>
                  <div className="text-sm text-red-800 font-medium">Risposte Errate</div>
                </div>
                <div className="bg-slate-100 p-4 rounded-xl border border-slate-200">
                  <div className="text-3xl font-bold text-slate-700">{skippedAnswers}</div>
                  <div className="text-sm text-slate-800 font-medium">Non Risposte</div>
                </div>
              </div>

              <button onClick={startTest} className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 mx-auto">
                <RotateCcw className="w-5 h-5"/> Ripeti il Test
              </button>
            </div>
          </div>
        );
      }

      const currentQuestion = quizQuestions[currentIndex];

      return (
        <div className="min-h-screen flex flex-col font-sans pb-24">
          {/* Header */}
          <header className="bg-white shadow-sm border-b sticky top-0 z-20">
            <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap lg:flex-nowrap items-center justify-between gap-4">
              <div className="flex items-center gap-2">
                <div className="bg-indigo-100 p-2 rounded-lg hidden sm:block"><BookOpen className="w-5 h-5 text-indigo-700"/></div>
                <span className="font-bold text-slate-800 tracking-tight whitespace-nowrap">Esame SFP</span>
              </div>
              
              <div className="flex-1 w-full lg:max-w-md mx-2 order-3 lg:order-none">
                <div className="flex justify-between text-xs font-bold text-slate-500 mb-1">
                  <span>Domanda {currentIndex + 1} di {quizQuestions.length}</span>
                  <span>{Math.round((answeredCount / quizQuestions.length) * 100)}% Completato</span>
                </div>
                <div className="w-full bg-slate-200 rounded-full h-2.5">
                  <div className="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${(answeredCount / quizQuestions.length) * 100}%` }}></div>
                </div>
              </div>

              <div className="flex items-center gap-2 lg:gap-4">
                <div className="text-sm font-semibold bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg border border-slate-200 hidden sm:block">
                  Punteggio: <span className="text-indigo-700">{currentScore.toFixed(2)}</span>
                </div>
                
                <button onClick={() => setShowGridModal(true)} className="flex items-center gap-2 px-3 py-1.5 bg-white border-2 border-slate-200 hover:border-indigo-400 rounded-lg font-bold text-slate-700 transition-colors">
                  <LayoutGrid className="w-4 h-4 text-indigo-600"/> <span className="hidden sm:inline">Griglia</span>
                </button>

                <button onClick={() => setShowSubmitModal(true)} className="flex items-center gap-2 px-4 py-1.5 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-bold transition-colors">
                  <Send className="w-4 h-4"/> <span className="hidden sm:inline">Consegna</span>
                </button>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col">
            <div className="mb-4 flex justify-between items-center">
              <span className="inline-block bg-indigo-100 text-indigo-800 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">
                {currentQuestion.category}
              </span>
              {!isAnswered && <span className="text-xs font-bold text-slate-400">Non risposta</span>}
            </div>

            <div className={currentQuestion.passage ? "flex flex-col lg:flex-row gap-8" : "w-full max-w-4xl mx-auto flex flex-col gap-6"}>
              
              {/* Brano lungo se presente */}
              {currentQuestion.passage && (
                <div className="w-full lg:w-1/2 flex flex-col">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex-1 lg:max-h-[calc(100vh-200px)] overflow-y-auto custom-scrollbar">
                    <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2 border-b pb-2">
                      <BookOpen className="w-5 h-5 text-indigo-600"/> Testo di Riferimento
                    </h3>
                    <div className="text-slate-700 leading-relaxed space-y-4 text-sm sm:text-base text-justify whitespace-pre-wrap">
                      {currentQuestion.passage}
                    </div>
                  </div>
                </div>
              )}

              {/* Domanda e Opzioni */}
              <div className={currentQuestion.passage ? "w-full lg:w-1/2 flex flex-col gap-4" : "w-full flex flex-col gap-4"}>
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="text-xl sm:text-2xl font-bold text-slate-800 leading-snug mb-2">
                    {currentQuestion.question}
                  </h2>
                </div>

                <div className="flex flex-col gap-3">
                  {currentQuestion.options.map((option, index) => {
                    const isSelected = isAnswered && currentAnswer.selectedIndex === index;
                    const isCorrectAnswer = index === currentQuestion.correctAnswerIndex;
                    
                    let buttonClass = "w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-3 relative overflow-hidden ";
                    
                    if (!isAnswered) {
                      buttonClass += "bg-white border-slate-200 hover:border-indigo-400 hover:bg-indigo-50 cursor-pointer text-slate-700";
                    } else {
                      buttonClass += "cursor-default ";
                      if (isCorrectAnswer) {
                        buttonClass += "bg-green-50 border-green-500 text-green-900 shadow-sm";
                      } else if (isSelected && !isCorrectAnswer) {
                        buttonClass += "bg-red-50 border-red-500 text-red-900 shadow-sm";
                      } else {
                        buttonClass += "bg-white border-slate-200 text-slate-400 opacity-60";
                      }
                    }

                    return (
                      <button key={index} disabled={isAnswered} onClick={() => handleSelectOption(index)} className={buttonClass}>
                        <div className={`mt-0.5 shrink-0 flex items-center justify-center w-6 h-6 rounded-full border-2 text-xs font-bold ${isAnswered && isCorrectAnswer ? 'border-green-600 bg-green-600 text-white' : isAnswered && isSelected && !isCorrectAnswer ? 'border-red-600 bg-red-600 text-white' : 'border-slate-300 text-slate-500'}`}>
                          {String.fromCharCode(65 + index)}
                        </div>
                        <span className="font-medium text-[15px] sm:text-base leading-snug">{option}</span>
                        
                        {isAnswered && isCorrectAnswer && (
                          <CheckCircle2 className="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 text-green-600" />
                        )}
                        {isAnswered && isSelected && !isCorrectAnswer && (
                          <XCircle className="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 text-red-600" />
                        )}
                      </button>
                    );
                  })}
                </div>

                {/* Feedback Immediato se ha risposto */}
                {isAnswered && (
                  <div className="animate-in fade-in duration-300 mt-2">
                    <div className={`p-5 rounded-xl border-l-4 shadow-sm ${currentAnswer.isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                      <h4 className="font-bold flex items-center gap-2 mb-2">
                        {currentAnswer.isCorrect ? (
                          <><CheckCircle2 className="w-5 h-5 text-green-600"/> Risposta Esatta (+1 pt)</>
                        ) : (
                          <><XCircle className="w-5 h-5 text-red-600"/> Risposta Errata (-0.25 pt)</>
                        )}
                      </h4>
                      <p className="text-sm text-slate-800 leading-relaxed font-medium">
                        {currentQuestion.explanation}
                      </p>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Bottom Navigation Bar */}
          <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
            <div className="max-w-4xl mx-auto flex items-center justify-between gap-4">
              <button 
                onClick={handlePrev} 
                disabled={currentIndex === 0}
                className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-bold hover:bg-slate-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
              >
                <ChevronLeft className="w-5 h-5"/> <span className="hidden sm:inline">Precedente</span>
              </button>
              
              {currentIndex < quizQuestions.length - 1 ? (
                <button 
                  onClick={handleNext}
                  className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors shadow-md"
                >
                  <span className="hidden sm:inline">{isAnswered ? "Prossima Domanda" : "Salta e vai avanti"}</span>
                  <span className="sm:hidden">{isAnswered ? "Prossima" : "Salta"}</span>
                  <ChevronRight className="w-5 h-5"/>
                </button>
              ) : (
                <button 
                  onClick={() => setShowSubmitModal(true)}
                  className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl transition-colors shadow-md"
                >
                  Consegna Test <Send className="w-5 h-5"/>
                </button>
              )}
            </div>
          </div>

          {/* Modal Mappa Domande (Griglia) */}
          {showGridModal && (
            <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-3xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center p-5 border-b bg-slate-50">
                  <h3 className="text-xl font-bold flex items-center gap-2 text-slate-800">
                    <LayoutGrid className="w-6 h-6 text-indigo-600"/> Mappa delle Domande
                  </h3>
                  <button onClick={() => setShowGridModal(false)} className="text-slate-400 hover:text-slate-700 p-1">
                    <X className="w-6 h-6" />
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                  <div className="grid grid-cols-5 sm:grid-cols-10 gap-2 sm:gap-3">
                    {quizQuestions.map((_, i) => {
                      const ans = userAnswers[i];
                      let btnClass = "w-full aspect-square rounded-lg font-bold text-sm flex items-center justify-center transition-all ";
                      
                      if (ans) {
                        btnClass += ans.isCorrect ? "bg-green-500 text-white border border-green-600 shadow-sm " : "bg-red-500 text-white border border-red-600 shadow-sm ";
                      } else {
                        btnClass += "bg-white border-2 border-slate-200 text-slate-500 hover:border-indigo-400 hover:text-indigo-600 ";
                      }

                      if (i === currentIndex) {
                        btnClass += "ring-4 ring-indigo-300 ring-offset-1 ";
                      }

                      return (
                        <button 
                          key={i}
                          onClick={() => { setCurrentIndex(i); setShowGridModal(false); }}
                          className={btnClass}
                        >
                          {i + 1}
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="p-4 border-t bg-slate-50 flex justify-center gap-6 text-sm font-semibold text-slate-600">
                  <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-green-500"></div> Esatta</div>
                  <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-red-500"></div> Errata</div>
                  <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-white border-2 border-slate-300"></div> Da fare</div>
                </div>
              </div>
            </div>
          )}

          {/* Modal Conferma Consegna */}
          {showSubmitModal && (
            <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl p-6 text-center animate-in zoom-in-95 duration-200">
                <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Send className="w-8 h-8"/>
                </div>
                <h3 className="text-2xl font-bold text-slate-800 mb-2">Vuoi consegnare il test?</h3>
                <p className="text-slate-600 mb-6">
                  Hai risposto a <strong className="text-indigo-600">{answeredCount}</strong> domande su <strong>{quizQuestions.length}</strong>. 
                  {answeredCount < quizQuestions.length && " Le domande non risposte varranno 0 punti."}
                </p>
                <div className="flex gap-3">
                  <button onClick={() => setShowSubmitModal(false)} className="flex-1 py-3 px-4 rounded-xl border-2 border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-colors">
                    Continua il test
                  </button>
                  <button onClick={submitTest} className="flex-1 py-3 px-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition-colors shadow-md">
                    Consegna ora
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
